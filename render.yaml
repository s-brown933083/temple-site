# render.yaml - Render.com deployment config
services:
  - type: web
    name: temple-site
    runtime: python
    region: singapore  # closest to Asia users
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
