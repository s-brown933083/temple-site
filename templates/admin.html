<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 禅意净土</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-card: rgba(0,0,0,0.4);
            --bg-secondary: #1a1a1a;
            --gold-primary: #c9a84c;
            --gold-dark: rgba(201,168,76,0.3);
            --gold-light: rgba(201,168,76,0.08);
            --text-primary: #e8e0d0;
            --text-secondary: #a09880;
            --border-dark: rgba(201,168,76,0.1);
            --danger: #e74c3c;
            --danger-hover: #c0392b;
        }
        
        body {
            font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* ── Layout ── */
        .app-container { display: flex; min-height: 100vh; }
        
        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, rgba(0,0,0,0.95), rgba(20,15,5,0.98));
            border-right: 1px solid var(--gold-dark);
            padding: 30px 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        
        .sidebar-brand {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid var(--gold-dark);
            margin-bottom: 20px;
        }
        .sidebar-brand .icon { font-size: 36px; }
        .sidebar-brand h2 { font-size: 18px; color: var(--gold-primary); font-weight: 400; margin-top: 8px; letter-spacing: 3px; }
        .sidebar-brand p { font-size: 11px; color: var(--text-secondary); letter-spacing: 2px; margin-top: 5px; opacity: 0.6; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 25px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            font-size: 15px;
            letter-spacing: 1px;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--gold-primary);
            background: var(--gold-light);
            border-left-color: var(--gold-primary);
        }
        .nav-item .badge {
            margin-left: auto;
            background: rgba(201,168,76,0.15);
            color: var(--gold-primary);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
        }
        
        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            left: 0; right: 0;
            padding: 0 20px;
        }
        .sidebar-footer .nav-item { font-size: 13px; }
        
        /* ── Main content ── */
        .main-content {
            margin-left: 220px;
            flex: 1;
            padding: 30px;
            min-height: 100vh;
        }
        
        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .top-bar h1 { font-size: 24px; font-weight: 400; letter-spacing: 3px; color: var(--gold-primary); }
        .top-bar .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid var(--gold-dark);
            background: transparent;
            color: var(--gold-primary);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn:hover { background: var(--gold-light); border-color: var(--gold-primary); }
        .btn-danger { border-color: rgba(231,76,60,0.3); color: var(--danger); }
        .btn-danger:hover { background: rgba(231,76,60,0.1); border-color: var(--danger); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        /* ── Stats cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(20,15,5,0.6));
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover { border-color: var(--gold-primary); transform: translateY(-2px); }
        .stat-number { font-size: 36px; color: var(--gold-primary); font-weight: 400; }
        .stat-label { font-size: 12px; color: var(--text-secondary); letter-spacing: 2px; margin-top: 5px; }
        .stat-sub { font-size: 11px; color: var(--text-secondary); opacity: 0.5; margin-top: 3px; }
        
        /* ── Filter bar ── */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar input, .filter-bar select {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--gold-dark);
            padding: 10px 14px;
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .filter-bar input:focus, .filter-bar select:focus { border-color: var(--gold-primary); }
        .filter-bar input::placeholder { color: var(--text-secondary); opacity: 0.5; }
        .filter-bar .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 350px;
        }
        
        /* ── Table ── */
        .table-container {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            overflow: hidden;
        }
        .table-container table {
            width: 100%;
            border-collapse: collapse;
        }
        .table-container thead {
            background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(139,26,26,0.08));
        }
        .table-container th {
            padding: 14px 12px;
            text-align: left;
            color: var(--gold-primary);
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--gold-dark);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .table-container th:hover { background: var(--gold-light); }
        .table-container th .sort-icon { margin-left: 4px; opacity: 0.5; }
        .table-container td {
            padding: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-dark);
            font-size: 14px;
        }
        .table-container tbody tr {
            transition: background 0.2s ease;
        }
        .table-container tbody tr:hover { background: rgba(201,168,76,0.03); }
        .table-container tbody tr:last-child td { border-bottom: none; }
        
        .photo-thumb {
            width: 48px; height: 48px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--gold-dark);
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .photo-thumb:hover { transform: scale(1.1); }
        .no-photo {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border: 1px dashed var(--gold-dark);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.5;
        }
        
        .gender-tag {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 3px;
            font-size: 12px;
            border: 1px solid;
        }
        .gender-male { border-color: rgba(52,152,219,0.4); color: #5dade2; }
        .gender-female { border-color: rgba(231,76,60,0.4); color: #ec7063; }
        
        .action-btns { display: flex; gap: 6px; }
        
        /* ── Pagination ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 20px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 14px;
            border: 1px solid var(--gold-dark);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .page-btn:hover { border-color: var(--gold-primary); color: var(--gold-primary); }
        .page-btn.active { background: var(--gold-primary); color: #000; border-color: var(--gold-primary); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { color: var(--text-secondary); font-size: 13px; margin: 0 10px; }
        
        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(135deg, #111, #1a1508);
            border: 1px solid var(--gold-dark);
            border-radius: 10px;
            padding: 30px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: inherit;
        }
        .modal-close:hover { color: var(--gold-primary); }
        .modal-photo {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 6px;
            border: 1px solid var(--gold-dark);
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
        }
        .modal-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .modal-field label { display: block; font-size: 11px; color: var(--gold-primary); letter-spacing: 1px; margin-bottom: 4px; }
        .modal-field .value { font-size: 16px; color: var(--text-primary); padding: 8px 12px; background: rgba(0,0,0,0.3); border-radius: 4px; }
        .modal-field.full { grid-column: 1 / -1; }
        
        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast-success { background: rgba(39,174,96,0.9); color: #fff; border: 1px solid rgba(39,174,96,0.5); }
        .toast-error { background: rgba(231,76,60,0.9); color: #fff; border: 1px solid rgba(231,76,60,0.5); }
        
        /* ── Loading ── */
        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        .loading-spinner .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 2px solid var(--gold-dark);
            border-top-color: var(--gold-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 48px; opacity: 0.2; margin-bottom: 15px; }
        .empty-state p { font-size: 16px; letter-spacing: 2px; }
        
        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 15px; }
            .mobile-menu-btn {
                display: block !important;
                background: none;
                border: 1px solid var(--gold-dark);
                color: var(--gold-primary);
                padding: 8px 12px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 20px;
            }
            .modal-info { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .mobile-menu-btn { display: none; }
        
        /* ── Trend chart (simple bar) ── */
        .trend-bar {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 60px;
            padding-top: 10px;
        }
        .trend-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .trend-col .bar {
            width: 100%;
            border-radius: 2px 2px 0 0;
            background: linear-gradient(180deg, var(--gold-primary), var(--gold-dark));
            transition: height 0.3s ease;
            min-height: 2px;
        }
        .trend-col .label { font-size: 9px; color: var(--text-secondary); opacity: 0.5; white-space: nowrap; }
        
        .loading-row td { text-align: center; padding: 40px !important; }
        
        /* Confirm dialog */
        .confirm-dialog { text-align: center; }
        .confirm-dialog p { font-size: 16px; margin-bottom: 20px; color: var(--text-primary); }
        .confirm-dialog .actions { display: flex; gap: 10px; justify-content: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="icon">☸</div>
                <h2>禅意净土</h2>
                <p>管理后台</p>
            </div>
            
            <div class="nav-item active" data-page="dashboard">
                <span>📊</span> 数据看板
            </div>
            <div class="nav-item" data-page="submissions">
                <span>📋</span> 提交记录
                <span class="badge" id="totalBadge">0</span>
            </div>
            
            <div class="sidebar-footer">
                <div class="nav-item" onclick="location.href='/admin/logout'">
                    <span>🚪</span> 退出登录
                </div>
            </div>
        </aside>
        
        <!-- Main -->
        <main class="main-content">
            <!-- Top bar -->
            <div class="top-bar">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 id="pageTitle">📊 数据看板</h1>
                </div>
                <div class="actions">
                    <button class="btn" onclick="exportCSV()">📥 导出 CSV</button>
                    <button class="btn" onclick="refreshData()">🔄 刷新</button>
                </div>
            </div>
            
            <!-- Dashboard Page -->
            <div id="page-dashboard">
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card"><div class="stat-number" id="statTotal">-</div><div class="stat-label">总提交数</div></div>
                    <div class="stat-card"><div class="stat-number" id="statToday">-</div><div class="stat-label">今日新增</div></div>
                    <div class="stat-card"><div class="stat-number" id="statPhoto">-</div><div class="stat-label">有照片</div></div>
                    <div class="stat-card" style="grid-column:span 2;">
                        <div class="stat-label" style="margin-bottom:8px;">近7天趋势</div>
                        <div class="trend-bar" id="trendBar"></div>
                    </div>
                </div>
                
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;">
                    <div class="stat-card">
                        <div class="stat-label" style="margin-bottom:10px;">性别分布</div>
                        <div id="genderStats"><span style="color:var(--text-secondary);opacity:0.5;font-size:13px;">加载中...</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label" style="margin-bottom:10px;">近期提交</div>
                        <div id="recentMiniList"><span style="color:var(--text-secondary);opacity:0.5;font-size:13px;">加载中...</span></div>
                    </div>
                </div>
            </div>
            
            <!-- Submissions Page -->
            <div id="page-submissions" style="display:none;">
                <div class="filter-bar">
                    <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索姓名或邮箱..." oninput="debounceSearch()">
                    <select id="genderFilter" onchange="loadSubmissions(1)">
                        <option value="all">全部性别</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="date" id="dateFrom" onchange="loadSubmissions(1)">
                    <input type="date" id="dateTo" onchange="loadSubmissions(1)">
                    <button class="btn btn-sm" onclick="clearFilters()">✕ 清除筛选</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th onclick="sortBy('id')">ID <span class="sort-icon">⇅</span></th>
                                <th>照片</th>
                                <th onclick="sortBy('name')">姓名 <span class="sort-icon">⇅</span></th>
                                <th onclick="sortBy('birthday')">生日 <span class="sort-icon">⇅</span></th>
                                <th onclick="sortBy('gender')">性别 <span class="sort-icon">⇅</span></th>
                                <th>邮箱</th>
                                <th onclick="sortBy('submitted_at')">提交时间 <span class="sort-icon">⇅</span></th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="submissionsBody">
                            <tr class="loading-row"><td colspan="8"><div class="loading-spinner"><div class="spinner"></div><p>加载中...</p></div></td></tr>
                        </tbody>
                    </table>
                    
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>
    
    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal" style="max-width:400px;">
            <div class="confirm-dialog">
                <p id="confirmMessage">确定要删除这条记录吗？</p>
                <div class="actions">
                    <button class="btn" onclick="closeConfirm()">取消</button>
                    <button class="btn btn-danger" id="confirmBtn">确定删除</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
<script>
// ─── State ───
let currentPage = 1;
let currentSortBy = 'submitted_at';
let currentSortOrder = 'DESC';
let deleteTargetId = null;
let searchTimer = null;

// ─── Init ───
document.addEventListener('DOMContentLoaded', () => {
    loadDashboard();
    loadSubmissions(1);
    
    // Sidebar nav
    document.querySelectorAll('[data-page]').forEach(el => {
        el.addEventListener('click', () => {
            const page = el.dataset.page;
            document.querySelectorAll('[data-page]').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('page-dashboard').style.display = page === 'dashboard' ? 'block' : 'none';
            document.getElementById('page-submissions').style.display = page === 'submissions' ? 'block' : 'none';
            document.getElementById('pageTitle').textContent = page === 'dashboard' ? '📊 数据看板' : '📋 提交记录';
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
            
            if (page === 'dashboard') loadDashboard();
        });
    });
});

// ─── Dashboard ───
function loadDashboard() {
    fetch('/admin/api/stats')
        .then(r => r.json())
        .then(d => {
            document.getElementById('statTotal').textContent = d.total;
            document.getElementById('statToday').textContent = d.today;
            document.getElementById('statPhoto').textContent = d.with_photo;
            document.getElementById('totalBadge').textContent = d.total;
            
            // Gender
            const gd = d.gender_stats || {};
            const genderHtml = Object.entries(gd).map(([k,v]) => 
                `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-dark);font-size:13px;">
                    <span>${k}</span>
                    <span style="color:var(--gold-primary);">${v}</span>
                </div>`
            ).join('');
            document.getElementById('genderStats').innerHTML = genderHtml || '<span style="opacity:0.5;">暂无数据</span>';
            
            // Trend
            const trend = d.trend || [];
            const maxVal = Math.max(...trend.map(t => t.count), 1);
            const bars = trend.map(t => {
                const h = Math.max(2, (t.count / maxVal) * 50);
                const day = t.date.slice(5);
                return `<div class="trend-col"><div class="bar" style="height:${h}px"></div><div class="label">${day}</div></div>`;
            }).join('');
            document.getElementById('trendBar').innerHTML = bars;
            
            // Recent list
            fetch('/admin/api/submissions?per_page=5&sort_by=submitted_at&sort_order=DESC')
                .then(r => r.json())
                .then(d2 => {
                    const list = (d2.submissions || []).map(s => 
                        `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border-dark);">
                            <span>${s.name}</span>
                            <span style="opacity:0.5;">${s.submitted_at ? s.submitted_at.slice(0,16).replace('T',' ') : ''}</span>
                        </div>`
                    ).join('');
                    document.getElementById('recentMiniList').innerHTML = list || '<span style="opacity:0.5;">暂无提交</span>';
                });
        })
        .catch(() => {});
}

// ─── Submissions Table ───
function loadSubmissions(page) {
    currentPage = page || 1;
    const search = encodeURIComponent(document.getElementById('searchInput').value);
    const gender = document.getElementById('genderFilter').value;
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    
    const url = `/admin/api/submissions?page=${currentPage}&per_page=20&search=${search}&gender=${gender}&date_from=${dateFrom}&date_to=${dateTo}&sort_by=${currentSortBy}&sort_order=${currentSortOrder}`;
    
    const tbody = document.getElementById('submissionsBody');
    tbody.innerHTML = '<tr class="loading-row"><td colspan="8"><div class="loading-spinner"><div class="spinner"></div><p>加载中...</p></div></td></tr>';
    
    fetch(url)
        .then(r => r.json())
        .then(d => {
            document.getElementById('totalBadge').textContent = d.total;
            
            if (!d.submissions || d.submissions.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">☸</div><p>暂无提交记录</p></div></td></tr>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            const rows = d.submissions.map(s => {
                const photoHtml = s.photo_filename 
                    ? `<img src="/static/uploads/${s.photo_filename}" class="photo-thumb" onclick="showDetail(${s.id})" title="点击查看详情">`
                    : '<div class="no-photo">无</div>';
                
                const genderClass = s.gender === '男' ? 'gender-male' : s.gender === '女' ? 'gender-female' : '';
                const genderHtml = `<span class="gender-tag ${genderClass}">${s.gender || '-'}</span>`;
                
                const time = s.submitted_at ? s.submitted_at.slice(0,16).replace('T',' ') : '-';
                const emailDisplay = s.email || '<span style="opacity:0.4;">-</span>';
                
                return `<tr>
                    <td style="font-family:monospace;">${s.id}</td>
                    <td>${photoHtml}</td>
                    <td><strong>${s.name}</strong></td>
                    <td>${s.birthday}</td>
                    <td>${genderHtml}</td>
                    <td style="font-size:13px;">${emailDisplay}</td>
                    <td style="font-size:12px;white-space:nowrap;">${time}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-sm" onclick="showDetail(${s.id})">👁️</button>
                            <button class="btn btn-sm btn-danger" onclick="confirmDelete(${s.id})">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
            tbody.innerHTML = rows;
            
            // Pagination
            renderPagination(d.page, d.total_pages, d.total);
        })
        .catch(() => {
            tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><p style="color:var(--danger);">加载失败，请刷新重试</p></div></td></tr>';
        });
}

function renderPagination(page, totalPages, total) {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    
    let html = `<span class="page-info">共 ${total} 条</span>`;
    html += `<button class="page-btn" onclick="loadSubmissions(1)" ${page <= 1 ? 'disabled' : ''}>«</button>`;
    html += `<button class="page-btn" onclick="loadSubmissions(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
    
    const start = Math.max(1, page - 2);
    const end = Math.min(totalPages, page + 2);
    
    if (start > 1) { html += `<button class="page-btn" onclick="loadSubmissions(1)">1</button>`; if (start > 2) html += `<span class="page-info">...</span>`; }
    
    for (let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadSubmissions(${i})">${i}</button>`;
    }
    
    if (end < totalPages) { if (end < totalPages - 1) html += `<span class="page-info">...</span>`; html += `<button class="page-btn" onclick="loadSubmissions(${totalPages})">${totalPages}</button>`; }
    
    html += `<button class="page-btn" onclick="loadSubmissions(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;
    html += `<button class="page-btn" onclick="loadSubmissions(${totalPages})" ${page >= totalPages ? 'disabled' : ''}>»</button>`;
    
    el.innerHTML = html;
}

// ─── Sort ───
function sortBy(field) {
    if (currentSortBy === field) {
        currentSortOrder = currentSortOrder === 'ASC' ? 'DESC' : 'ASC';
    } else {
        currentSortBy = field;
        currentSortOrder = 'DESC';
    }
    loadSubmissions(1);
}

// ─── Search ───
function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadSubmissions(1), 300);
}

function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('genderFilter').value = 'all';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    loadSubmissions(1);
}

// ─── Detail Modal ───
function showDetail(id) {
    fetch(`/admin/api/submissions/${id}`)
        .then(r => r.json())
        .then(s => {
            const photoHtml = s.photo_filename 
                ? `<img src="/static/uploads/${s.photo_filename}" class="modal-photo" alt="照片">`
                : '<div style="text-align:center;padding:40px;border:1px dashed var(--gold-dark);border-radius:6px;margin-bottom:20px;color:var(--text-secondary);">📷 未上传照片</div>';
            
            document.getElementById('modalContent').innerHTML = `
                ${photoHtml}
                <div class="modal-info">
                    <div class="modal-field"><label>姓名</label><div class="value">${s.name}</div></div>
                    <div class="modal-field"><label>性别</label><div class="value">${s.gender || '-'}</div></div>
                    <div class="modal-field"><label>生日</label><div class="value">${s.birthday}</div></div>
                    <div class="modal-field"><label>邮箱</label><div class="value">${s.email || '-'}</div></div>
                    <div class="modal-field full"><label>提交时间</label><div class="value">${s.submitted_at?.replace('T',' ') || '-'}</div></div>
                    <div class="modal-field full" style="text-align:center;margin-top:10px;">
                        <button class="btn btn-danger" onclick="closeModal();confirmDelete(${s.id})">🗑️ 删除此记录</button>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.add('show');
        });
}

function closeModal() {
    document.getElementById('detailModal').classList.remove('show');
}

// ─── Delete ───
function confirmDelete(id) {
    deleteTargetId = id;
    document.getElementById('confirmMessage').textContent = `确定要删除 ID 为 ${id} 的记录吗？此操作不可恢复。`;
    const btn = document.getElementById('confirmBtn');
    btn.onclick = doDelete;
    document.getElementById('confirmModal').classList.add('show');
}

function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('show');
    deleteTargetId = null;
}

function doDelete() {
    const id = deleteTargetId;
    closeConfirm();
    
    fetch(`/admin/api/submissions/${id}/delete`, { method: 'POST' })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                showToast('✅ 已删除', 'success');
                loadSubmissions(currentPage);
                loadDashboard();
            } else {
                showToast('❌ ' + (d.error || '删除失败'), 'error');
            }
        })
        .catch(() => showToast('❌ 网络错误', 'error'));
}

// ─── Export CSV ───
function exportCSV() {
    window.location.href = '/admin/api/submissions/export';
}

// ─── Refresh ───
function refreshData() {
    loadDashboard();
    if (document.getElementById('page-submissions').style.display !== 'none') {
        loadSubmissions(currentPage);
    }
    showToast('🔄 已刷新', 'success');
}

// ─── Toast ───
function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast toast-' + type + ' show';
    setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Click outside modal ───
document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.getElementById('confirmModal').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
});
</script>
</body>
</html>
