[railway]
  plugin = "python"

[build]
  builder = "python"
  pythonVersion = "311"

[deploy]
  startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
  healthCheckPath = "/health"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[environment]
  PORT = "8000"
  PYTHON_VERSION = "3.11"
